data:
  dataset_root: Dataset_final/Dataset_final/Frames_Bons_Definitius
  splits_file: null
  split_strategy: group
  split_ratios: [0.70, 0.15, 0.15]
  image_size: [224, 398]
  sequence_length: 6
  include_shot_frame: true
  seed: 42

training:
  epochs: 40
  batch_size: 16
  num_workers: 0
  learning_rate: 0.0003
  weight_decay: 0.0001
  dropout: 0.25
  early_stopping_patience: 10
  max_grad_norm: 1.0
  use_amp: true
  threshold: auto
  threshold_metric: f1
  selection_metric: average_precision
  pos_weight_strategy: sqrt
  pos_weight_scale: 1.0
  augment: true

model:
  name: cnn
  backbone: auto
  pretrained: true
  freeze_backbone: true
  feature_dim: 256
  cnn_channels: [32, 64, 128, 256]
  classifier_hidden_dim: 128
  lstm_hidden_dim: 256
  lstm_layers: 1
  attention_heads: 4
  attention_layers: 2
  attention_ff_dim: 512

output:
  run_dir: runs
